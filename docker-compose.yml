services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://lp:${POSTGRES_PASSWORD:-lppass}@db:5432/lpmonitor
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
    networks:
      - lp-net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lppass}
      POSTGRES_DB: lpmonitor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lp -d lpmonitor"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lp-net

volumes:
  pgdata:

networks:
  lp-net:
    driver: bridge
